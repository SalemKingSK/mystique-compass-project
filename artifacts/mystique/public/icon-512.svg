  <path d="M256 256 L172 172 L256 130 Z" fill="url(#gold_grad)" opacity="0.38"/>
  <path d="M256 256 L340 172 L382 256 Z" fill="url(#gold_grad)" opacity="0.38"/>
  <path d="M256 256 L340 340 L256 382 Z" fill="url(#gold_grad)" opacity="0.38"/>
  <path d="M256 256 L172 340 L130 256 Z" fill="url(#gold_grad)" opacity="0.38"/>
