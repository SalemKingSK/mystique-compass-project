  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring_grad)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="url(#ring_grad)" stroke-width="0.8" opacity="0.2"/>
